<script>
// Глобальные переменные
let chart;
let isUserZoomed = false;
let lastRange = null;
let lastTimestamp = '<?php echo $last_data['DateTime'] ?? ''; ?>';
let updateInterval = 10000; // 10 секунд

// Инициализация графика
function initChart() {
    try {
        // Проверка загрузки Highcharts
        if (!window.Highcharts || !Highcharts.stockChart) {
            throw new Error('Библиотека Highcharts не загрузилась');
        }

        // Получение данных
        const graphData = <?php echo json_encode($graph_data); ?>;
        
        if (!Array.isArray(graphData)) {
            throw new Error('Данные должны быть массивом');
        }

        // Функция подготовки данных
        function prepareCleanSeries(fieldName) {
            return graphData
                .filter(item => !isNaN(item[fieldName]))
                .map(item => {
                    const date = new Date(item.datetime);
                    return [date.getTime(), parseFloat(item[fieldName])];
                })
                .sort((a, b) => a[0] - b[0]);
        }

        Highcharts.setOptions({
            time: {
                useUTC: false
            }
        });

        // Создание графика
        chart = Highcharts.stockChart('combined-chart', {
            chart: {
                type: "line",
                zoomType: "x",
                reflow: false,
                animation: {
                    duration: 1000
                },
                events: {
                    load: function() {
                        // Устанавливаем начальный диапазон 6 часов
                        const now = Date.now()+3600*1000*5;
                        this.xAxis[0].setExtremes(
                            now - (1 * 3600 * 1000),
                            now
                        );
                    }
                }
            },
			// Добавьте этот блок в конфигурацию:
			tooltip: {

				shared: true,
				crosshairs: true,
				formatter: function() {
					let s = '<b>' + Highcharts.dateFormat('%Y-%m-%d %H:%M:%S', this.x) + '</b>';
					
					this.points.forEach(point => {
						s += '<br/><span style="color:' + point.color + '">●</span> ' + 
							 point.series.name + ': <b>' + 
							 Highcharts.numberFormat(point.y, 2) + '</b>';
					});
					
					return s;
				}
			},
            rangeSelector: {
                buttons: [
                    { type: "minute", count: 15, text: "15m" },
                    { type: "hour", count: 1, text: "1h" },
                    { type: "hour", count: 6, text: "6h" },
                    { type: "all", text: "all" }
                ],
                inputEnabled: false,
                selected: 2,
            },
            navigator: {
                enabled: true,
                series: {
                    dataGrouping: {
                        units: [
                            ["second", [1]],
                            ["minute", [1, 5, 15]],
                            ["hour", [1, 6]],
                        ],
                    },
                },
            },
            scrollbar: {
                enabled: true,
            },
            title: {
                text: 'Параметры котла ПВК',
                style: { fontSize: '18px' }
            },
            xAxis: {
                events: {
                    afterSetExtremes: function(e) {
                        if (e.trigger && e.trigger !== 'syncExtremes') {
                            isUserZoomed = true;
                            lastRange = { min: e.min, max: e.max };
                        }
                    }
                }
            },
            yAxis: [
                {
                    title: { text: 'Температура (°C)', align: 'middle' },
                    height: '50%',
                    offset: 0
                },
                {
                    title: { text: 'Мощность (%)', align: 'middle' },
                    top: '50%',
                    height: '25%',
                    opposite: true,
                    min: 0,
                    max: 100
                },
                {
                    title: { text: 'Насос (мл/час)', align: 'middle' },
                    top: '75%',
                    height: '25%',
                    opposite: true,
                    min: 0,
                    max: 2000
                }
            ],
            series: [
                {
                    name: 't колонны (t1)',
                    data: prepareCleanSeries('t1'),
                    yAxis: 0,
                    color: '#FF0000',
                    lineWidth: 2,
                    connectNulls: true,
                    threshold: null,
                    turboThreshold: 0
                },
                {
                    name: 't бака (t2)',
                    data: prepareCleanSeries('t2'),
                    yAxis: 0,
                    color: '#00AA00',
                    lineWidth: 2,
                    connectNulls: true,
                    threshold: null,
                    turboThreshold: 0
                },
                {
                    name: 'Мощность (pd)',
                    data: prepareCleanSeries('pd'),
                    yAxis: 1,
                    color: '#0000FF',
                    lineWidth: 2,
                    connectNulls: true,
                    threshold: null,
                    turboThreshold: 0
                },
                {
                    name: 'Насос (мл/час)',
                    data: prepareCleanSeries('p1'),
                    yAxis: 2,
                    color: '#0000FF',
                    lineWidth: 2,
                    connectNulls: true,
                    threshold: null,
                    turboThreshold: 0
                }
            ],
            plotOptions: {
                series: {
                    animation: {
                        duration: 1000,
                        defer: 500
                    },
                    marker: {
                        enabled: false
                    },
                    states: {
                        hover: {
                            enabled: true,
                            lineWidthPlus: 2
                        }
                    }
                }
            }
        });

    } catch (e) {
        console.error('Ошибка:', e);
        $('#debug').html('<div class="error">' + e.message + '</div>');
    }
}


// Функция обновления данных
function updateData() {
    $.ajax({
        url: 'get_new_data.php?last=' + encodeURIComponent(lastTimestamp),
        dataType: 'json',
        success: function(data) {
            if (data && data.length > 0) {
                // Обновляем последнюю временную метку
                lastTimestamp = data[data.length-1].datetime;
                
                // Обновляем данные на графике - передаем ВЕСЬ МАССИВ
                updateChart(data);
                
                // Обновляем текущие значения - передаем ПОСЛЕДНИЙ ОБЪЕКТ
                const lastData = data[data.length-1];
                console.log('Последние данные для таблицы:', lastData); // Отладка
                updateCurrentValues(lastData);
                
                // Обновляем время последнего обновления
                $('#last-update-time').text(new Date(lastTimestamp).toLocaleString());
            }
            
            // Планируем следующее обновление
            setTimeout(updateData, updateInterval);
        },
        error: function(xhr, status, error) {
            console.error('Ошибка при обновлении данных:', error);
            setTimeout(updateData, updateInterval);
        }
    });
}



// Обновление графика
function updateChart(newData) {

    console.log('Данные для графика:', newData);
    
    if (!newData || newData.length === 0) {
        console.log('Нет новых данных для графика');
        return;
    }
    
    console.log('Количество новых точек:', newData.length);


    // Добавляем новые точки
    chart.series.forEach((series, index) => {
        const field = ['t1', 't2', 'pd', 'p1'][index];
        newData.forEach(point => {
            const timestamp = new Date(point.datetime).getTime();
            const value = parseFloat(point[field]);
            if (!isNaN(value)) {
                series.addPoint([timestamp, value], false, false);
            }
        });
    });
    
    // Автоматическое смещение, если не в ручном зуме
    if (1) {//!isUserZoomed
        const now = Date.now()+3600*1000*5;
        chart.xAxis[0].setExtremes(
            now - (1 * 3600 * 1000),
            now,
            true,
            { duration: 1000 }
        );
    }
    
    // Единая перерисовка
    chart.redraw();
}

// Обновление текущих значений
function updateCurrentValues(data) {
    $('#current-t1').text(data.t1 + ', °C');
    $('#current-t2').text(data.t2 + ', °C');
    $('#current-pd').text(data.pd * 28 +' Вт, ' + data.pd + ' %');

    
	// Обновляем таблицу
	$('#data-t1').text(data.t1);
	$('#data-t2').text(data.t2);
	$('#data-t3').text(data.t3);
	$('#data-pr').text(data.pr);
	$('#data-tr').text(data.tr);
	$('#data-hc').text(data.hc);
	$('#data-pd').text(data.pd);
	$('#data-p1').text(data.p1);
	$('#data-p2').text(data.p2);
	$('#data-pressure').text(data.pressure);
	$('#data-cm').text(data.cm);
	$('#data-imode').text(data.imode);
	$('#data-imenu').text(data.imenu);
	$('#data-phase').text(data.phase);
	$('#data-phaseTime').text(data.phaseTime);
	$('#data-spoint').text(data.spoint);
	$('#data-k_integ').text(data.k_integ);
	$('#data-k_deriv').text(data.k_deriv);
	$('#data-kp').text(data.kp);
	$('#data-ki').text(data.ki);
	$('#data-kd').text(data.kd);
}

// Управление зумом
function setZoom(hours) {
    isUserZoomed = true;
    const now = Date.now()+3600*1000*5;
    chart.xAxis[0].setExtremes(
        now - (hours * 3600 * 1000),
        now,
        true
    );
}

function resetZoom() {
    isUserZoomed = false;
    const now = Date.now()+3600*1000*5;
    chart.xAxis[0].setExtremes(
        now - (6 * 3600 * 1000),
        now,
        true
    );
}

// Запуск при загрузке страницы
$(document).ready(function() {
    initChart();
    updateData();
    
    // Сброс флага зума через 5 минут
    setInterval(() => {
        if (isUserZoomed) {
            isUserZoomed = false;
        }
    }, 90000);
});
</script>
